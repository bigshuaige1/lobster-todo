<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 龙虾待办清单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        #taskInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }
        #addBtn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #addBtn:hover { transform: scale(1.05); }
        #addBtn:active { transform: scale(0.95); }
        .task-list {
            list-style: none;
        }
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .task-item.completed span {
            text-decoration: line-through;
            color: #999;
        }
        .task-actions {
            display: flex;
            gap: 10px;
        }
        .task-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .complete-btn {
            background: #28a745;
            color: white;
        }
        .delete-btn {
            background: #dc3545;
            color: white;
        }
        .task-btn:hover { opacity: 0.8; }
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }
        .stats {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 龙虾待办清单</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="输入新任务..." onkeypress="if(event.key==='Enter')addTask()">
            <button id="addBtn" onclick="addTask()">添加</button>
        </div>
        <ul class="task-list" id="taskList"></ul>
        <div class="stats" id="stats"></div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            const stats = document.getElementById('stats');
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-state">暂无任务，添加一个吧！🦞</div>';
                stats.innerHTML = '';
                return;
            }

            taskList.innerHTML = tasks.map((task, index) => `
                <li class="task-item ${task.completed ? 'completed' : ''}">
                    <span>${escapeHtml(task.text)}</span>
                    <div class="task-actions">
                        <button class="task-btn complete-btn" onclick="toggleTask(${index})">
                            ${task.completed ? '↩️' : '✅'}
                        </button>
                        <button class="task-btn delete-btn" onclick="deleteTask(${index})">🗑️</button>
                    </div>
                </li>
            `).join('');

            const completed = tasks.filter(t => t.completed).length;
            stats.innerHTML = `共 ${tasks.length} 个任务 | 已完成 ${completed} 个 | 待完成 ${tasks.length - completed} 个`;
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (text) {
                tasks.push({ text, completed: false });
                saveTasks();
                renderTasks();
                input.value = '';
            }
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        renderTasks();
    </script>
</body>
</html>
